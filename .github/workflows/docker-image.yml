name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Runs when you push to the main branch
  # Allow rebuilding on demand (e.g. to republish a rollback image).
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest for the running stack, plus an immutable :<sha> tag so a
          # specific build can always be pinned or rolled back to.
          tags: |
            nunobifes/comics-scraper-py:latest
            nunobifes/comics-scraper-py:${{ github.sha }}

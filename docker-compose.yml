---
services:
  python-script:
    image: nunobifes/comics-scraper-py:latest  # The name of your image
    container_name: comics-scraper-py
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - METRON_USER=your_metron_username
      - METRON_PASS=your_metron_password
    volumes:
      - /path/on/your/system/comics:/app/comics   # series_list.txt lives here
      - /path/on/your/system/logs:/app/logs
      - /path/on/your/system/cache:/app/cache     # search_cache.json lives here
    restart: unless-stopped
    # "Run python. IF successful (&&), sleep 24h. IF failed (||), exit 1."
    entrypoint: ["sh", "-c", "while true; do python main.py && sleep 86400 || exit 1; done"]

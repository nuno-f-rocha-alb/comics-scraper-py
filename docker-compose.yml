---
services:
  python-script:
    image: nunobifes/comics-scraper-py:latest  # The name of your image
    build: .                                    # `docker compose build` bundles the React SPA (Dockerfile stage 1)
    container_name: comics-scraper-py
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - METRON_USER=your_metron_username
      - METRON_PASS=your_metron_password
      - COMICVINE_API_KEY=your_comicvine_api_key
      - SCHEDULE_INTERVAL_HOURS=24
      - LOG_LEVEL=INFO   # DEBUG to trace every Metron API request
      # Nightly Metron cache refresh (keeps series pages cache-only). 5-field cron.
      - METRON_NIGHTLY_CRON=0 3 * * *
      # Optional — enables pushing reading lists straight to Komga (CBL export
      # works without these). Set KOMGA_URL (no trailing slash, e.g.
      # http://komga:25600) + KOMGA_API_KEY in your shell/.env to turn it on;
      # left empty the push route 400s and the UI hides the button.
      - KOMGA_URL=${KOMGA_URL:-}
      - KOMGA_API_KEY=${KOMGA_API_KEY:-}
      # Cloudflare "are you human" solver. Points at the flaresolverr sidecar below.
      - FLARESOLVERR_URL=http://flaresolverr:8191
      # Optional upstream proxy for the solver (single endpoint, no rotation).
      # - PROXY_URL=http://user:pass@host:port
    ports:
      - "8000:8000"
    volumes:
      - /path/on/your/system/comics:/app/comics
      - /path/on/your/system/logs:/app/logs
      - /path/on/your/system/cache:/app/cache     # search_cache.json + comics.db live here
    depends_on:
      - flaresolverr
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=Etc/UTC
    ports:
      - "8191:8191"
    restart: unless-stopped

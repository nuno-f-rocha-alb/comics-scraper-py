---
services:
  python-script:
    image: nunobifes/comics-scraper-py:latest  # The name of your image
    container_name: comics-scraper-py
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - METRON_USER=your_metron_username
      - METRON_PASS=your_metron_password
      - COMICVINE_API_KEY=your_comicvine_api_key
      - SCHEDULE_INTERVAL_HOURS=24
    ports:
      - "8000:8000"
    volumes:
      - /path/on/your/system/comics:/app/comics
      - /path/on/your/system/logs:/app/logs
      - /path/on/your/system/cache:/app/cache     # search_cache.json + comics.db live here
    restart: unless-stopped
